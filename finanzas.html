<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F0F1A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <meta name="description" content="Control personal de finanzas" />
  <title>Finanzas Personal</title>

  <!-- PWA Manifest inline via JS -->
  <script>
    const manifestData = {
      name: "Control Personal de Finanzas",
      short_name: "Finanzas",
      description: "Control personal de ingresos y gastos",
      start_url: ".",
      display: "standalone",
      background_color: "#0F0F1A",
      theme_color: "#0F0F1A",
      orientation: "portrait",
      icons: [
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%230F0F1A'/%3E%3Ctext x='50%25' y='55%25' font-size='120' text-anchor='middle' dominant-baseline='middle'%3E💰%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230F0F1A'/%3E%3Ctext x='50%25' y='55%25' font-size='320' text-anchor='middle' dominant-baseline='middle'%3E💰%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], { type: "application/json" });
    const manifestURL = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = manifestURL;
    document.head.appendChild(link);
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0F1A;
      --surface: #1A1A2E;
      --surface2: #16213E;
      --gold: #C9A96E;
      --gold-dim: #C9A96E55;
      --gold-faint: #C9A96E11;
      --green: #1DD1A1;
      --red: #FF6B6B;
      --text: #F0EDE8;
      --text-dim: #FFFFFF44;
      --border: #FFFFFF0A;
      --border-dim: #FFFFFF15;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Header */
    #header {
      padding: 40px 24px 16px;
      flex-shrink: 0;
      /* safe area top */
      padding-top: max(40px, env(safe-area-inset-top, 40px));
    }

    .header-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .header-title {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      font-family: 'IM Fell English', Georgia, serif;
    }

    .header-line {
      width: 32px;
      height: 2px;
      background: var(--gold);
      margin-top: 8px;
      border-radius: 2px;
    }

    /* Scroll area */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px 20px;
      -webkit-overflow-scrolling: touch;
    }

    #content::-webkit-scrollbar { width: 3px; }
    #content::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Bottom nav */
    #nav {
      flex-shrink: 0;
      background: #0F0F1Aee;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid #FFFFFF0A;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
    }

    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: #FFFFFF33;
      transition: color 0.2s;
      padding: 4px 12px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn.active { color: var(--gold); }
    .nav-btn:active { transform: scale(0.9); }

    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-icon.big { font-size: 28px; }
    .nav-label { font-size: 10px; letter-spacing: 1px; font-family: 'Cormorant Garamond', serif; }

    /* Toast */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-style: italic;
      border: 1px solid var(--gold-dim);
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 8px 30px #00000080;
      transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Cards */
    .balance-card {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      padding: 24px 22px;
      margin-top: 16px;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s ease;
    }

    .balance-card::before {
      content: '';
      position: absolute;
      right: -20px; top: -20px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #C9A96E0A;
    }

    .balance-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #C9A96E88;
      text-transform: uppercase;
    }

    .balance-amount {
      font-size: 38px;
      font-weight: 400;
      margin-top: 8px;
      letter-spacing: -1px;
      font-family: 'IM Fell English', serif;
    }

    .balance-amount.positive { color: var(--green); }
    .balance-amount.negative { color: var(--red); }

    .balance-row {
      display: flex;
      gap: 24px;
      margin-top: 20px;
    }

    .balance-divider {
      width: 1px;
      background: #FFFFFF10;
    }

    .mini-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .mini-amount {
      font-size: 16px;
      margin-top: 2px;
      font-family: 'IM Fell English', serif;
    }

    /* Category bars */
    .section-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #C9A96E88;
      text-transform: uppercase;
      margin-bottom: 14px;
      margin-top: 24px;
    }

    .cat-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      animation: slideIn 0.3s ease;
    }

    .cat-icon-sm {
      font-size: 14px;
      width: 28px;
      text-align: center;
    }

    .cat-name-sm {
      font-size: 12px;
      color: var(--text-dim);
      width: 80px;
      flex-shrink: 0;
    }

    .cat-bar-bg {
      flex: 1;
      background: #FFFFFF08;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }

    .cat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .cat-bar-amount {
      font-size: 12px;
      font-style: italic;
      width: 90px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Recent */
    .record-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #FFFFFF08;
      animation: slideIn 0.3s ease;
    }

    .record-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .record-icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .record-desc { font-size: 14px; }

    .record-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .record-amount {
      font-size: 15px;
      font-style: italic;
      font-family: 'IM Fell English', serif;
    }

    .record-amount.income { color: var(--green); }
    .record-amount.expense { color: var(--red); }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #FF6B6B66;
      padding: 4px 6px;
      opacity: 0;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .record-row:hover .del-btn,
    .del-btn.always { opacity: 1; }

    /* Add form */
    .form-section { margin-top: 16px; animation: slideIn 0.3s ease; }

    .type-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .type-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border-dim);
      background: transparent;
      color: #FFFFFF44;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .type-btn.active-income {
      background: #1DD1A122;
      border-color: var(--green);
      color: var(--green);
    }

    .type-btn.active-expense {
      background: #C9A96E11;
      border-color: var(--gold);
      color: var(--gold);
    }

    .field-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: #C9A96E88;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field-wrap { margin-bottom: 16px; }

    .field-input, .field-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field-input:focus, .field-select:focus {
      outline: none;
      border-color: var(--gold);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .cat-tile {
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      padding: 10px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .cat-tile.selected {
      border-color: var(--gold);
      background: var(--gold-faint);
    }

    .cat-tile-icon { font-size: 20px; }
    .cat-tile-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
    .cat-tile.selected .cat-tile-label { color: var(--gold); }

    .save-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      color: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 1px;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .save-btn:active { transform: scale(0.97); opacity: 0.85; }
    .save-btn.income-btn { background: var(--green); }
    .save-btn.expense-btn { background: var(--gold); }

    /* History filters */
    .filter-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .filter-scroll::-webkit-scrollbar { display: none; }

    .filter-btn {
      white-space: nowrap;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-dim);
      background: transparent;
      color: #FFFFFF44;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active {
      border-color: var(--gold);
      background: #C9A96E22;
      color: var(--gold);
    }

    /* Summary cards */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      animation: slideIn 0.3s ease;
    }

    .summary-card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .summary-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .summary-name { font-size: 15px; }
    .summary-count { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .summary-total {
      font-size: 16px;
      font-style: italic;
      font-family: 'IM Fell English', serif;
      margin-left: auto;
    }

    .progress-bg {
      background: #FFFFFF08;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-pct {
      font-size: 11px;
      color: #FFFFFF33;
      margin-top: 6px;
      text-align: right;
    }

    .total-row {
      background: var(--gold-faint);
      border: 1px solid #C9A96E33;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .empty {
      text-align: center;
      color: #FFFFFF33;
      padding: 48px 0;
      font-style: italic;
      font-size: 15px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* install banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--gold-dim);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 13px;
      color: var(--text);
      z-index: 100;
      width: calc(100% - 48px);
      max-width: 382px;
      box-shadow: 0 8px 40px #00000088;
      animation: slideIn 0.3s ease;
    }

    #install-banner.visible { display: block; }

    .install-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .install-text { font-style: italic; color: var(--gold); flex: 1; }

    .install-btn {
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'Cormorant Garamond', serif;
      cursor: pointer;
    }

    .dismiss-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="header-label">Control Personal</div>
    <div class="header-title" id="header-title">Resumen</div>
    <div class="header-line"></div>
  </div>

  <div id="content"></div>

  <nav id="nav">
    <button class="nav-btn active" data-view="home" onclick="navigate('home')">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Inicio</span>
    </button>
    <button class="nav-btn" data-view="add" onclick="navigate('add')">
      <span class="nav-icon big">＋</span>
      <span class="nav-label">Agregar</span>
    </button>
    <button class="nav-btn" data-view="history" onclick="navigate('history')">
      <span class="nav-icon">≡</span>
      <span class="nav-label">Historial</span>
    </button>
    <button class="nav-btn" data-view="summary" onclick="navigate('summary')">
      <span class="nav-icon">◉</span>
      <span class="nav-label">Resumen</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<div id="install-banner">
  <div class="install-row">
    <span class="install-text">💰 Instalar como app en tu dispositivo</span>
    <button class="install-btn" onclick="installApp()">Instalar</button>
    <button class="dismiss-btn" onclick="dismissBanner()">✕</button>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const CATEGORIES = [
  { id: "housing",       label: "Vivienda",        icon: "🏠", color: "#FF6B6B" },
  { id: "food",          label: "Alimentación",    icon: "🍔", color: "#FF9F43" },
  { id: "transport",     label: "Transporte",      icon: "🚌", color: "#54A0FF" },
  { id: "health",        label: "Salud",           icon: "💊", color: "#5F27CD" },
  { id: "entertainment", label: "Entretenimiento", icon: "🎮", color: "#00D2D3" },
  { id: "education",     label: "Educación",       icon: "📚", color: "#1DD1A1" },
  { id: "clothing",      label: "Ropa",            icon: "👗", color: "#F368E0" },
  { id: "savings",       label: "Ahorro",          icon: "🏦", color: "#48DBFB" },
  { id: "other",         label: "Otros",           icon: "📦", color: "#C8D6E5" },
];

// ─── STATE ───────────────────────────────────────────────────────────────────

let state = {
  view: "home",
  type: "expense",
  amount: "",
  description: "",
  category: "food",
  date: today(),
  filterCat: "all",
  records: loadRecords(),
};

function today() {
  return new Date().toISOString().split("T")[0];
}

function loadRecords() {
  try {
    const saved = localStorage.getItem("finanzas_records");
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [
    { id: 1, type: "income",  amount: 1750905, description: "Sueldo",      category: null,            date: "2026-03-15" },
    { id: 2, type: "expense", amount: 120000,  description: "Mercado",     category: "food",          date: "2026-03-16" },
    { id: 3, type: "expense", amount: 50000,   description: "Bus semanal", category: "transport",     date: "2026-03-17" },
    { id: 4, type: "expense", amount: 35000,   description: "Netflix",     category: "entertainment", date: "2026-03-18" },
  ];
}

function saveRecords() {
  try { localStorage.setItem("finanzas_records", JSON.stringify(state.records)); } catch(e) {}
}

// ─── FORMATTERS ─────────────────────────────────────────────────────────────

function formatCOP(n) {
  return new Intl.NumberFormat("es-CO", {
    style: "currency", currency: "COP", minimumFractionDigits: 0
  }).format(n);
}

// ─── COMPUTED ───────────────────────────────────────────────────────────────

function totalIncome()   { return state.records.filter(r => r.type === "income").reduce((s,r) => s + r.amount, 0); }
function totalExpense()  { return state.records.filter(r => r.type === "expense").reduce((s,r) => s + r.amount, 0); }
function balance()       { return totalIncome() - totalExpense(); }

function expenseByCategory() {
  return CATEGORIES.map(cat => ({
    ...cat,
    total: state.records.filter(r => r.type === "expense" && r.category === cat.id).reduce((s,r) => s + r.amount, 0),
  })).filter(c => c.total > 0).sort((a,b) => b.total - a.total);
}

function getCat(id) { return CATEGORIES.find(c => c.id === id); }

// ─── TOAST ──────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

const TITLES = { home: "Resumen", add: "Nueva entrada", history: "Historial", summary: "Por categoría" };

function navigate(view) {
  state.view = view;
  document.querySelectorAll(".nav-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.view === view);
  });
  document.getElementById("header-title").textContent = TITLES[view];
  render();
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────

function handleAdd() {
  const rawAmount = state.amount.replace(/\./g, "").replace(",", ".");
  if (!rawAmount || isNaN(Number(rawAmount))) { showToast("Ingresa un monto válido"); return; }
  const val = parseFloat(rawAmount);
  if (val <= 0) { showToast("El monto debe ser mayor a 0"); return; }

  const record = {
    id: Date.now(),
    type: state.type,
    amount: val,
    description: state.description || (state.type === "income" ? "Ingreso" : "Gasto"),
    category: state.type === "expense" ? state.category : null,
    date: state.date,
  };

  state.records = [record, ...state.records];
  state.amount = "";
  state.description = "";
  state.date = today();
  saveRecords();
  showToast(state.type === "income" ? "✅ Ingreso agregado" : "✅ Gasto agregado");
  navigate("home");
}

function handleDelete(id) {
  state.records = state.records.filter(r => r.id !== id);
  saveRecords();
  showToast("🗑️ Eliminado");
  render();
}

// ─── RENDER VIEWS ────────────────────────────────────────────────────────────

function renderHome() {
  const bal = balance();
  const inc = totalIncome();
  const exp = totalExpense();
  const cats = expenseByCategory();
  const recent = state.records.slice(0, 5);

  let catsHTML = "";
  if (cats.length) {
    catsHTML = `<div class="section-label">Gastos por categoría</div>`;
    cats.forEach(cat => {
      const pct = exp > 0 ? Math.min(100, (cat.total / exp) * 100) : 0;
      catsHTML += `
        <div class="cat-bar-row">
          <span class="cat-icon-sm">${cat.icon}</span>
          <span class="cat-name-sm">${cat.label}</span>
          <div class="cat-bar-bg">
            <div class="cat-bar-fill" style="width:${pct}%;background:${cat.color}"></div>
          </div>
          <span class="cat-bar-amount" style="color:${cat.color}">${formatCOP(cat.total)}</span>
        </div>`;
    });
  }

  let recentHTML = "";
  if (recent.length) {
    recentHTML = `<div class="section-label">Recientes</div>`;
    recent.forEach(r => {
      const cat = r.category ? getCat(r.category) : null;
      const bgColor = cat ? cat.color + "22" : "#1DD1A122";
      const icon = r.type === "income" ? "💰" : (cat?.icon || "📦");
      const sign = r.type === "income" ? "+" : "-";
      const amtClass = r.type === "income" ? "income" : "expense";
      const meta = (cat ? cat.label + " · " : "") + r.date;
      recentHTML += `
        <div class="record-row">
          <div class="record-left">
            <div class="record-icon-wrap" style="background:${bgColor}">${icon}</div>
            <div>
              <div class="record-desc">${esc(r.description)}</div>
              <div class="record-meta">${meta}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="record-amount ${amtClass}">${sign}${formatCOP(r.amount)}</span>
            <button class="del-btn always" onclick="handleDelete(${r.id})">✕</button>
          </div>
        </div>`;
    });
  }

  return `
    <div class="balance-card">
      <div class="balance-label">Balance actual</div>
      <div class="balance-amount ${bal >= 0 ? 'positive' : 'negative'}">${formatCOP(bal)}</div>
      <div class="balance-row">
        <div>
          <div class="mini-label" style="color:#1DD1A180">Ingresos</div>
          <div class="mini-amount" style="color:var(--green)">+${formatCOP(inc)}</div>
        </div>
        <div class="balance-divider"></div>
        <div>
          <div class="mini-label" style="color:#FF6B6B80">Gastos</div>
          <div class="mini-amount" style="color:var(--red)">-${formatCOP(exp)}</div>
        </div>
      </div>
    </div>
    ${catsHTML}
    ${recentHTML}
  `;
}

function renderAdd() {
  const isIncome = state.type === "income";

  let catsHTML = "";
  if (!isIncome) {
    catsHTML = `<div class="field-label">Categoría</div><div class="cat-grid">`;
    CATEGORIES.forEach(cat => {
      const sel = state.category === cat.id ? "selected" : "";
      catsHTML += `
        <div class="cat-tile ${sel}" onclick="selectCat('${cat.id}')">
          <span class="cat-tile-icon">${cat.icon}</span>
          <span class="cat-tile-label">${cat.label}</span>
        </div>`;
    });
    catsHTML += `</div>`;
  }

  const saveBtnClass = isIncome ? "income-btn" : "expense-btn";

  return `
    <div class="form-section">
      <div class="type-row">
        <button class="type-btn ${!isIncome ? 'active-expense' : ''}" onclick="setType('expense')">💸 Gasto</button>
        <button class="type-btn ${isIncome ? 'active-income' : ''}" onclick="setType('income')">💰 Ingreso</button>
      </div>

      <div class="field-wrap">
        <div class="field-label">Monto (COP)</div>
        <input class="field-input" type="number" inputmode="decimal" placeholder="0"
          value="${esc(state.amount)}"
          oninput="state.amount=this.value" />
      </div>

      <div class="field-wrap">
        <div class="field-label">Descripción</div>
        <input class="field-input" type="text" placeholder="${isIncome ? 'Ej: Sueldo' : 'Ej: Mercado'}"
          value="${esc(state.description)}"
          oninput="state.description=this.value" />
      </div>

      ${catsHTML}

      <div class="field-wrap">
        <div class="field-label">Fecha</div>
        <input class="field-input" type="date" value="${state.date}"
          onchange="state.date=this.value" />
      </div>

      <button class="save-btn ${saveBtnClass}" onclick="handleAdd()">Guardar entrada</button>
    </div>
  `;
}

function renderHistory() {
  const filters = [
    { id: "all", label: "Todos", icon: "📋" },
    { id: "income", label: "Ingresos", icon: "💰" },
    ...CATEGORIES
  ];

  let filtersHTML = `<div class="filter-scroll">`;
  filters.forEach(f => {
    const active = state.filterCat === f.id ? "active" : "";
    filtersHTML += `<button class="filter-btn ${active}" onclick="setFilter('${f.id}')">${f.icon} ${f.label}</button>`;
  });
  filtersHTML += `</div>`;

  const filtered = state.filterCat === "all"
    ? state.records
    : state.records.filter(r =>
        r.category === state.filterCat ||
        (state.filterCat === "income" && r.type === "income")
      );

  let recordsHTML = "";
  if (!filtered.length) {
    recordsHTML = `<div class="empty">No hay registros</div>`;
  } else {
    filtered.forEach(r => {
      const cat = r.category ? getCat(r.category) : null;
      const bgColor = cat ? cat.color + "22" : "#1DD1A122";
      const icon = r.type === "income" ? "💰" : (cat?.icon || "📦");
      const sign = r.type === "income" ? "+" : "-";
      const amtClass = r.type === "income" ? "income" : "expense";
      const meta = (cat ? cat.label + " · " : "") + r.date;
      recordsHTML += `
        <div class="record-row">
          <div class="record-left">
            <div class="record-icon-wrap" style="background:${bgColor}">${icon}</div>
            <div>
              <div class="record-desc">${esc(r.description)}</div>
              <div class="record-meta">${meta}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="record-amount ${amtClass}">${sign}${formatCOP(r.amount)}</span>
            <button class="del-btn always" onclick="handleDelete(${r.id})">✕</button>
          </div>
        </div>`;
    });
  }

  return filtersHTML + recordsHTML;
}

function renderSummary() {
  const cats = expenseByCategory();
  const exp = totalExpense();

  if (!cats.length) return `<div class="empty">Sin gastos registrados</div>`;

  let html = "";
  cats.forEach(cat => {
    const pct = exp > 0 ? Math.min(100, (cat.total / exp) * 100) : 0;
    const count = state.records.filter(r => r.category === cat.id).length;
    html += `
      <div class="summary-card">
        <div class="summary-card-top">
          <div class="summary-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div style="flex:1">
            <div class="summary-name">${cat.label}</div>
            <div class="summary-count">${count} transacción${count !== 1 ? 'es' : ''}</div>
          </div>
          <div class="summary-total" style="color:${cat.color}">${formatCOP(cat.total)}</div>
        </div>
        <div class="progress-bg">
          <div class="progress-fill" style="width:${pct}%;background:${cat.color}"></div>
        </div>
        <div class="progress-pct">${pct.toFixed(1)}% del total</div>
      </div>`;
  });

  html += `
    <div class="total-row">
      <span style="font-size:13px;color:#C9A96E88">Total gastos</span>
      <span style="font-size:18px;color:var(--gold);font-style:italic;font-family:'IM Fell English',serif">${formatCOP(exp)}</span>
    </div>`;

  return html;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render() {
  const content = document.getElementById("content");
  switch (state.view) {
    case "home":    content.innerHTML = renderHome();    break;
    case "add":     content.innerHTML = renderAdd();     break;
    case "history": content.innerHTML = renderHistory(); break;
    case "summary": content.innerHTML = renderSummary(); break;
  }
  content.scrollTop = 0;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function esc(str) {
  if (!str) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function setType(t) {
  state.type = t;
  render();
}

function selectCat(id) {
  state.category = id;
  render();
}

function setFilter(id) {
  state.filterCat = id;
  render();
}

// ─── PWA INSTALL ────────────────────────────────────────────────────────────

let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").classList.add("visible");
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    dismissBanner();
  });
}

function dismissBanner() {
  document.getElementById("install-banner").classList.remove("visible");
}

// ─── SERVICE WORKER (inline via Blob) ───────────────────────────────────────

const SW_CODE = `
const CACHE = 'finanzas-v1';
const ASSETS = [self.location.href];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => cached))
  );
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}

// ─── INIT ────────────────────────────────────────────────────────────────────

render();
</script>
